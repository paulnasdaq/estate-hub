name: housing-prod

# Production stack: Postgres + backend built image, no source mount.
# Secrets are read from the environment (or a project-root .env file); nothing
# sensitive is hard-coded here. Required: POSTGRES_PASSWORD.
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d

# Shared across the backend and one-shot migrate services.
x-backend-image: &backend-image
  build:
    context: ./backend

x-backend-env: &backend-env
  ENVIRONMENT: production
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-app}

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: apply migrations, then exit. The backend waits for this to
  # succeed, so schema upgrades happen exactly once regardless of replica count.
  migrate:
    <<: *backend-image
    command: alembic upgrade head
    environment: *backend-env
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  backend:
    <<: *backend-image
    restart: unless-stopped
    command: fastapi run app/main.py --host 0.0.0.0 --port 8000
    environment: *backend-env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Static build served by nginx, which also proxies /api to the backend so the
  # browser talks to a single origin.
  dashboard:
    build:
      context: ./dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
