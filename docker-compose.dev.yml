name: housing-dev

# Local development stack: Postgres + hot-reloading backend.
# Usage:
#   docker compose -f docker-compose.dev.yml up --build

# Shared across the backend and one-shot migrate services.
x-backend-base: &backend-base
  build:
    context: ./backend
  environment:
    ENVIRONMENT: local
    LOG_LEVEL: DEBUG
    DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
  volumes:
    # Live-mount the source (hot reload / latest migrations). The venv is at
    # /opt/venv, so it is not shadowed by this mount.
    - ./backend:/app

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      # Exposed so you can connect with a local psql/GUI during development.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Shared Redis: Celery broker/result backend plus general app use.
  redis:
    image: redis:7-alpine
    ports:
      # Exposed so you can inspect keys with a local redis-cli during dev.
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: apply migrations, then exit.
  migrate:
    <<: *backend-base
    command: alembic upgrade head
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  backend:
    <<: *backend-base
    # Auto-reloading dev server (migrations handled by the migrate service).
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Celery worker: executes queued and scheduled tasks.
  worker:
    <<: *backend-base
    command: celery -A app.core.celery_app worker --loglevel=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Celery beat: enqueues periodic tasks on the schedule in celery_app.py.
  beat:
    <<: *backend-base
    command: celery -A app.core.celery_app beat --loglevel=INFO
    depends_on:
      redis:
        condition: service_healthy

  # Flower: web UI for inspecting workers, tasks, and queues.
  # Opt-in: `docker compose -f docker-compose.dev.yml --profile monitoring up`.
  flower:
    <<: *backend-base
    command: celery -A app.core.celery_app flower --port=5555
    profiles: ["monitoring"]
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  # Vite dev server with hot reload. Installs deps on start (into the named
  # volume, so the host's node_modules never shadows the container's), then
  # serves on 5173. Its /api proxy targets the backend service by name.
  dashboard:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  dashboard_node_modules:
