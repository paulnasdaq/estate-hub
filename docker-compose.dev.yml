name: housing-dev

# Local development stack: Postgres + hot-reloading backend.
# Usage:
#   docker compose -f docker-compose.dev.yml up --build

# Shared across the backend and one-shot migrate services.
x-backend-base: &backend-base
  build:
    context: ./backend
  environment:
    ENVIRONMENT: local
    LOG_LEVEL: DEBUG
    DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
  volumes:
    # Live-mount the source (hot reload / latest migrations). The venv is at
    # /opt/venv, so it is not shadowed by this mount.
    - ./backend:/app

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      # Exposed so you can connect with a local psql/GUI during development.
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: apply migrations, then exit.
  migrate:
    <<: *backend-base
    command: alembic upgrade head
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  backend:
    <<: *backend-base
    # Auto-reloading dev server (migrations handled by the migrate service).
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
